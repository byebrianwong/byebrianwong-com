<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Variation 2 — The Hand</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Hoefler Text", Georgia, "Times New Roman", serif;
    background:
      radial-gradient(120% 90% at 50% 120%, #1d5b43 0%, #0f3a2c 45%, #07140f 100%);
    color: #f4ecd8;
    height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }
  /* felt texture + vignette */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none;
    background:
      radial-gradient(80% 60% at 50% 110%, transparent 40%, rgba(0,0,0,.55) 100%),
      repeating-linear-gradient(45deg, rgba(255,255,255,.012) 0 2px, transparent 2px 4px);
  }
  header { text-align: center; padding: 40px 20px 0; position: relative; z-index: 2; }
  .kicker { font-family: ui-sans-serif, system-ui; font-size: 11px; letter-spacing: .4em; text-transform: uppercase; color: #cda86a; margin: 0 0 10px; }
  h1 { margin: 0; font-size: clamp(30px, 5vw, 48px); font-weight: 600; letter-spacing: .01em; color: #f6edd6; }
  header p { font-family: ui-sans-serif, system-ui; color: #9db7a6; max-width: 520px; margin: 14px auto 0; font-size: 14px; }

  .table { flex: 1; position: relative; }
  .hand {
    position: absolute; left: 50%; bottom: -90px;
    transform: translateX(-50%);
    width: 1px; height: 1px;
  }
  .card {
    position: absolute; left: -110px; bottom: 0;
    width: 220px; aspect-ratio: 5 / 7;
    transform-origin: 50% 150%;
    transition: transform .45s cubic-bezier(.2,.8,.2,1), filter .45s ease;
    will-change: transform;
    cursor: pointer;
  }
  .card .skin {
    position: relative; width: 100%; height: 100%; border-radius: 16px; overflow: hidden;
    background:
      linear-gradient(160deg, #1a1410, #0c0a08);
    border: 1px solid rgba(214,178,110,.5);
    box-shadow:
      0 1px 0 rgba(255,255,255,.08) inset,
      0 26px 50px -18px rgba(0,0,0,.85);
  }
  /* gold filigree frame */
  .card .skin::before {
    content: ""; position: absolute; inset: 8px; border-radius: 10px;
    border: 1px solid rgba(214,178,110,.45);
    box-shadow: 0 0 0 1px rgba(0,0,0,.4) inset;
    pointer-events: none;
  }
  .art {
    position: absolute; top: 16px; left: 16px; right: 16px; height: 48%;
    border-radius: 8px; overflow: hidden; display: grid; place-items: center;
    background:
      radial-gradient(120% 100% at 30% 0%, color-mix(in srgb, var(--accent) 70%, #1a1410), #0b0907 75%);
    box-shadow: 0 0 0 1px rgba(214,178,110,.35) inset;
  }
  .art .icon { font-size: 60px; filter: drop-shadow(0 6px 12px rgba(0,0,0,.6)); }
  .foil {
    position: absolute; inset: 0; pointer-events: none; opacity: .35;
    background: linear-gradient(115deg, transparent 35%, rgba(255,240,200,.7) 48%, rgba(180,220,255,.4) 52%, transparent 66%);
    background-size: 250% 250%; background-position: 50% 50%;
    mix-blend-mode: overlay;
  }
  .label { position: absolute; left: 0; right: 0; bottom: 20px; text-align: center; padding: 0 14px; }
  .label .nm { font-size: 22px; font-weight: 600; letter-spacing: .03em; color: #f3e6c6; }
  .label .tg { font-family: ui-sans-serif, system-ui; font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #c7a667; margin-top: 4px; }
  .corner { position: absolute; font-family: ui-sans-serif, system-ui; font-weight: 800; font-size: 13px; color: #d8b873; }
  .corner.tl { top: 12px; left: 14px; }
  .corner.br { bottom: 12px; right: 14px; transform: rotate(180deg); }
  .suit { font-size: 10px; display: block; opacity: .8; }

  /* spotlight overlay */
  .stage {
    position: fixed; inset: 0; z-index: 50; display: none;
    align-items: center; justify-content: center;
    background: rgba(5,12,9,.0); backdrop-filter: blur(0px);
    transition: background .35s ease, backdrop-filter .35s ease;
  }
  .stage.on { display: flex; background: rgba(5,12,9,.72); backdrop-filter: blur(6px); }
  .stage .big {
    width: min(360px, 80vw); aspect-ratio: 5/7; position: relative;
    transform: translateY(20px) scale(.9); opacity: 0;
    transition: transform .4s cubic-bezier(.2,.8,.2,1), opacity .3s ease;
  }
  .stage.on .big { transform: translateY(0) scale(1); opacity: 1; }
  .stage .detail {
    position: absolute; left: calc(100% + 28px); top: 50%; transform: translateY(-50%);
    width: 280px; color: #f4ecd8;
  }
  .stage .detail h2 { font-size: 30px; margin: 0 0 4px; }
  .stage .detail .dt { font-family: ui-sans-serif, system-ui; color: #cda86a; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; margin: 0 0 16px; }
  .stage .detail p { font-family: ui-sans-serif, system-ui; line-height: 1.6; color: #cfe0d4; font-size: 14px; }
  .stage .detail .row { font-family: ui-sans-serif, system-ui; display: flex; justify-content: space-between; padding: 8px 0; border-top: 1px solid rgba(214,178,110,.25); font-size: 13px; }
  .stage .detail .row b { color: #f3e6c6; }
  .stage .detail .go { display:inline-block; margin-top: 18px; font-family: ui-sans-serif, system-ui; font-weight: 700; font-size: 13px; color:#0c1a13; background:#d8b873; padding:11px 18px; border-radius:10px; text-decoration:none; }
  .close-hint { position: fixed; top: 22px; right: 26px; font-family: ui-sans-serif, system-ui; font-size: 12px; color:#9db7a6; z-index: 51; }
  .hint { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); font-family: ui-sans-serif, system-ui; font-size: 12px; color:#7f9a8a; z-index: 3; }
  @media (max-width: 760px){ .stage .detail{ position: static; transform:none; width:min(360px,80vw); margin-top:18px; } .stage.on{ flex-direction:column; } }
</style>
</head>
<body>
  <header>
    <p class="kicker">Variation 2</p>
    <h1>The Hand</h1>
    <p>A dealt hand of cards. Hover to fan them open and lift one toward you — neighbors slide aside. Click to draw it to the table.</p>
  </header>

  <div class="table">
    <div class="hand" id="hand"></div>
  </div>

  <div class="stage" id="stage">
    <div class="big" id="big"></div>
  </div>
  <div class="close-hint" id="closeHint" style="display:none">click anywhere to close ✕</div>
  <div class="hint">tip: hover the hand to fan · click a card to draw it</div>

  <script src="data.js"></script>
  <script>
    const hand = document.getElementById('hand');
    const N = APPS.length;
    const SPREAD = 9;        // degrees between cards
    const ARC = 16;          // px of downward arc at the edges
    let hovered = null;

    const cardEl = (app, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.style.setProperty('--accent', app.accent);
      el.dataset.i = i;
      el.innerHTML = `
        <div class="skin">
          <span class="corner tl">${app.name[0]}<span class="suit">${app.icon}</span></span>
          <div class="art"><span class="icon">${app.icon}</span><div class="foil"></div></div>
          <div class="label"><div class="nm">${app.name}</div><div class="tg">${app.tagline}</div></div>
          <span class="corner br">${app.name[0]}<span class="suit">${app.icon}</span></span>
        </div>`;
      el.addEventListener('pointerenter', () => { hovered = i; layout(); });
      el.addEventListener('click', () => draw(app));
      return el;
    };

    const cards = APPS.map(cardEl);
    cards.forEach(c => hand.appendChild(c));
    hand.addEventListener('pointerleave', () => { hovered = null; layout(); });

    function layout() {
      const mid = (N - 1) / 2;
      cards.forEach((card, i) => {
        const off = i - mid;
        let rot = off * SPREAD;
        let ty = Math.abs(off) * ARC;     // edges dip lower → arc
        let tx = 0, lift = 0, scale = 1, z = i;
        if (hovered !== null) {
          if (i === hovered) { rot = 0; ty = 0; lift = -120; scale = 1.16; z = 100; }
          else {
            const d = i - hovered;
            tx = Math.sign(d) * Math.max(0, 70 - Math.abs(d) * 14);
            lift = 14;
          }
        }
        card.style.transform =
          `translateX(${tx}px) translateY(${ty + lift}px) rotate(${rot}deg) scale(${scale})`;
        card.style.zIndex = z;
        card.style.filter = (hovered !== null && i !== hovered) ? 'brightness(.7)' : 'none';
      });
    }
    layout();

    // --- draw to center ---
    const stage = document.getElementById('stage');
    const big = document.getElementById('big');
    const closeHint = document.getElementById('closeHint');
    function draw(app) {
      big.innerHTML = `
        <div class="skin" style="--accent:${app.accent}">
          <span class="corner tl">${app.name[0]}<span class="suit">${app.icon}</span></span>
          <div class="art"><span class="icon" style="font-size:88px">${app.icon}</span><div class="foil"></div></div>
          <div class="label"><div class="nm" style="font-size:30px">${app.name}</div><div class="tg">${app.tagline}</div></div>
          <span class="corner br">${app.name[0]}<span class="suit">${app.icon}</span></span>
        </div>
        <div class="detail">
          <h2>${app.name}</h2>
          <p class="dt">${app.tagline}</p>
          <p>${app.blurb}</p>
          <div class="row"><span>Users</span><b>${app.stats.users}</b></div>
          <div class="row"><span>Rating</span><b>★ ${app.stats.rating}</b></div>
          <div class="row"><span>Platform</span><b>${app.stats.platform}</b></div>
          <div class="row"><span>Launched</span><b>${app.year}</b></div>
          <a class="go" href="#" onclick="event.preventDefault()">Open ${app.name} →</a>
        </div>`;
      // re-attach foil shimmer on the big card
      stage.classList.add('on'); closeHint.style.display = 'block';
    }
    const closeStage = () => { stage.classList.remove('on'); closeHint.style.display = 'none'; };
    stage.addEventListener('click', closeStage);
  </script>
</body>
</html>
