name: Test

# Runs the type check and the Storybook story tests (vitest browser mode) on
# every PR and push to main, so a change that breaks a story — a crash, a
# timeout, a stale selector — is caught before it merges, not after.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # The Storybook vitest project renders stories in a real Chromium.
      - run: npx playwright install --with-deps chromium
      - name: Type check
        run: npx tsc --noEmit
      - name: Story tests
        run: npx vitest --project storybook run
